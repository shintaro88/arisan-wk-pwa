name: Deploy Arisan WK PWA

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy PWA to GitHub Pages
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify ZIP exists
        run: |
          test -f arisan_wk_pwa_starter.zip
          ls -lah arisan_wk_pwa_starter.zip

      - name: Unzip PWA project
        run: |
          rm -rf site
          mkdir -p site
          unzip -o arisan_wk_pwa_starter.zip -d site
          ls -la site
          test -f site/index.html
          test -f site/manifest.json
          test -f site/service-worker.js

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
